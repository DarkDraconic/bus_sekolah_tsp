<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Bus Sekolah Madiun</title>

  <link rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">

  <link rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

  <style>
    body{
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:#f3f7ff;
      font-family:'Segoe UI',sans-serif;
    }

    .login-card{
      width:100%;
      max-width:420px;
      border:none;
      border-radius:24px;
      overflow:hidden;
      box-shadow:0 15px 40px rgba(0,0,0,.08);
    }

    .login-top{
      background:linear-gradient(135deg,#2563eb,#4f46e5);
      color:white;
      padding:40px 30px;
      text-align:center;
    }

    .login-top i{
      font-size:55px;
    }

    .login-body{
      padding:30px;
      background:white;
    }

    .form-control{
      height:52px;
      border-radius:14px;
    }

    .btn-login{
      height:52px;
      border-radius:14px;
      background:#2563eb;
      border:none;
      font-weight:600;
    }

    .btn-login:hover{
      background:#1d4ed8;
    }
  </style>
</head>
<body>

<div class="card login-card">

  <div class="login-top">
    <i class="bi bi-bus-front-fill"></i>
    <h3 class="mt-3 mb-1">Bus Sekolah Madiun</h3>
    <p class="mb-0 opacity-75">
      Sistem Monitoring & Tracking
    </p>
  </div>

  <div class="login-body">

    <form action="login.php" method="POST">

      <div class="mb-3">
        <label class="form-label">Username</label>
        <input type="text"
               name="username"
               class="form-control"
               required>
      </div>

      <div class="mb-4">
        <label class="form-label">Password</label>
        <input type="password"
               name="password"
               class="form-control"
               required>
      </div>

      <button type="submit" class="btn btn-primary btn-login w-100">
        <i class="bi bi-box-arrow-in-right me-2"></i>
        Login
      </button>

    </form>

  </div>

</div>

</body>
</html>
